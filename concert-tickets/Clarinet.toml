[project]
name = 'concert-tickets'
description = ''
authors = []
telemetry = true
cache_dir = '.\.cache'
requirements = []
[contracts.ticket-models]
path = 'contracts/ticket-models.clar'

[contracts.ticket-utils]
path = "contracts/ticket-utils.clar"
depends_on = ["ticket-models"]

[contracts.concert-marketplace]
path = "contracts/concert-marketplace.clar"
